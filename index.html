<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VOID — Deep Rest</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Helvetica Neue', system-ui, -apple-system, sans-serif;
      background: #090909;
      color: rgba(255,255,255,0.88);
      height: 100dvh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Background gradient ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 20% 20%, #1a1a1a 0%, transparent 65%),
        radial-gradient(ellipse 55% 50% at 80% 80%, #111111 0%, transparent 60%),
        linear-gradient(160deg, #141414 0%, #000000 60%, #0d0d0d 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Screens ── */
    .screen {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease;
      opacity: 0;
      z-index: 1;
    }
    .screen.active { display: flex; opacity: 1; }
    .screen:not(.active) { pointer-events: none; }

    /* ── Wordmark ── */
    .wordmark {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.28);
      position: absolute;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
    }

    /* ── Glass card ── */
    .glass-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 44px 52px;
      background: rgba(255,255,255,0.055);
      backdrop-filter: blur(36px);
      -webkit-backdrop-filter: blur(36px);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 28px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 32px 80px rgba(0,0,0,0.45);
      min-width: 360px;
    }

    /* Thin separator inside glass card */
    .g-sep {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }

    /* ── Typography ── */
    .hero { display: flex; flex-direction: column; align-items: center; gap: 10px; }

    .hero-title {
      font-size: 50px;
      font-weight: 200;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .hero-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.38);
      line-height: 1.75;
      text-align: center;
      max-width: 250px;
    }

    .label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.32);
    }

    /* ── Duration ── */
    .duration-row { display: flex; flex-direction: column; align-items: center; gap: 11px; }

    .pill-group {
      display: flex;
      gap: 3px;
      position: relative;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 10px;
      padding: 3px;
    }

    /* Sliding glass indicator */
    .pill-indicator {
      position: absolute;
      top: 3px;
      left: 3px;
      height: calc(100% - 6px);
      background: rgba(255,255,255,0.13);
      border-radius: 7px;
      pointer-events: none;
      transition: left 0.32s cubic-bezier(0.34, 1.15, 0.64, 1),
                  width 0.32s cubic-bezier(0.34, 1.15, 0.64, 1);
    }

    .pill {
      position: relative; /* sit above indicator */
      z-index: 1;
      padding: 7px 18px;
      border: none;
      border-radius: 7px;
      background: transparent;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.38);
      cursor: pointer;
      transition: color 0.2s;
    }
    .pill.on { color: rgba(255,255,255,0.90); }

    /* ── Buttons ── */
    .btn {
      padding: 12px 34px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:hover  { opacity: 0.80; }
    .btn:active { transform: scale(0.98); }

    /* White solid — primary action */
    .btn-dark {
      background: rgba(255,255,255,0.92);
      color: #0A0A0A;
    }

    /* Glass ghost */
    .btn-ghost {
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.65);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 11px 28px;
    }

    .btn-row { display: flex; gap: 10px; }

    /* ── Cam badge ── */
    .cam-badge { display: flex; align-items: center; gap: 7px; }

    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.28);
      flex-shrink: 0;
    }
    .dot.ready { background: #52C47E; }
    .dot.pulse { animation: blink 1.6s ease infinite; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    /* ── Cooldown timer ── */
    .cd-time {
      font-size: 52px;
      font-weight: 100;
      letter-spacing: -0.04em;
      font-variant-numeric: tabular-nums;
      color: rgba(255,255,255,0.88);
    }

    .cd-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      text-align: center;
      line-height: 1.7;
      max-width: 230px;
    }

    /* ── End icon ── */
    .end-icon {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: rgba(255,255,255,0.45);
    }

    .end-title {
      font-size: 28px;
      font-weight: 200;
      letter-spacing: -0.02em;
      color: rgba(255,255,255,0.88);
    }

    .end-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.38);
      line-height: 1.7;
      text-align: center;
      max-width: 240px;
    }

    /* ── REST canvas ── */
    #screen-rest { background: #060606; padding: 0; }

    #rest-canvas, #dist-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #dist-canvas {
      pointer-events: none;
      opacity: 0;
      transition: opacity 2s ease;
    }

    #cam-video {
      position: fixed;
      width: 1px; height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    #progress {
      position: fixed;
      bottom: 0; left: 0;
      height: 1px;
      background: rgba(255,255,255,0.16);
      width: 0%;
      transition: width 0.9s linear;
    }
  </style>
</head>
<body>

<!-- ═══ COOLDOWN ═══ -->
<div class="screen" id="screen-cooldown">
  <span class="wordmark">VOID</span>
  <div class="glass-card" style="gap:18px;">
    <p class="label">다음 세션까지</p>
    <p class="cd-time" id="cd-display">00:00</p>
    <div class="g-sep"></div>
    <p class="cd-sub">뇌가 완전히 리셋될 시간이 필요합니다.<br>이 시간은 업무 집중에 사용하세요.</p>
  </div>
</div>

<!-- ═══ START ═══ -->
<div class="screen active" id="screen-start">
  <span class="wordmark">VOID</span>
  <div class="glass-card">
    <div class="hero">
      <h1 class="hero-title">Deep Rest.</h1>
    </div>
    <div class="g-sep"></div>
    <div class="duration-row">
      <span class="label">휴식 시간</span>
      <div class="pill-group" id="pill-group">
        <div class="pill-indicator" id="pill-indicator"></div>
        <button class="pill on" data-min="5">5분</button>
        <button class="pill" data-min="10">10분</button>
        <button class="pill" data-min="15">15분</button>
        <button class="pill" data-min="20">20분</button>
      </div>
    </div>
    <button class="btn btn-dark" id="btn-start">시작하기</button>
    <div class="cam-badge">
      <span class="dot pulse" id="cam-dot"></span>
      <span class="label" id="cam-label" style="letter-spacing:0.12em;">웹캠 준비 중</span>
    </div>
  </div>
</div>

<!-- ═══ REST ═══ -->
<div class="screen" id="screen-rest">
  <canvas id="rest-canvas"></canvas>
  <canvas id="dist-canvas"></canvas>
  <video id="cam-video" autoplay muted playsinline></video>
  <div id="progress"></div>
</div>

<!-- ═══ FAIL ═══ -->
<div class="screen" id="screen-fail">
  <span class="wordmark">VOID</span>
  <div class="glass-card" style="gap:20px;">
    <div class="end-icon">&#33;</div>
    <div style="text-align:center; display:flex; flex-direction:column; gap:7px; align-items:center;">
      <span class="label">세션 종료</span>
      <h2 class="end-title">움직임이 감지됐어요</h2>
      <p class="end-sub">일하러 돌아갈 시간입니다.</p>
    </div>
    <div class="g-sep"></div>
    <div class="btn-row">
      <button class="btn btn-ghost" id="btn-retry">다시 시도</button>
      <button class="btn btn-dark" id="btn-close-fail">닫기</button>
    </div>
  </div>
</div>

<!-- ═══ DONE ═══ -->
<div class="screen" id="screen-done">
  <span class="wordmark">VOID</span>
  <div class="glass-card" style="gap:20px;">
    <div class="end-icon">✓</div>
    <div style="text-align:center; display:flex; flex-direction:column; gap:7px; align-items:center;">
      <span class="label">세션 완료</span>
      <h2 class="end-title">뇌가 리셋되었습니다</h2>
      <p class="end-sub">심층 휴식이 성공적으로 완료됐습니다.<br>이제 창의적인 업무로 돌아가세요.</p>
    </div>
    <div class="g-sep"></div>
    <button class="btn btn-dark" id="btn-close-done">창 닫기</button>
  </div>
</div>

<script type="module">
// ═══════════════════════════════════════════════════════
//  VOID — Deep Rest  |  Single-file Pure JS/HTML/CSS
// ═══════════════════════════════════════════════════════

import { FaceLandmarker, FilesetResolver }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

// ── State ──────────────────────────────────────────────
let selectedMin = 5;
let faceLandmarker = null;
let camStream = null;
let serverTimeOffset = 0; // ms offset between server clock and local clock

let contentAnimId = null;
let distAnimId = null;
let sessionTimerId = null;

let moveCount = 0;
let moveFrames = 0;
let moveActive = false;
let lastNose = null;
let monitorRunning = false;

const MOVE_THRESHOLD = 0.015;  // relative to face width
const MOVE_FRAMES    = 8;      // ~0.27s at 30fps

// ── Screen helper ──────────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── Duration pills ─────────────────────────────────────
function moveIndicator(pill) {
  const indicator = document.getElementById('pill-indicator');
  if (!indicator) return;
  indicator.style.left  = pill.offsetLeft + 'px';
  indicator.style.width = pill.offsetWidth + 'px';
}

document.querySelectorAll('.pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(b => b.classList.remove('on'));
    p.classList.add('on');
    selectedMin = parseInt(p.dataset.min);
    moveIndicator(p);
  });
});

// Init indicator to the default selected pill
window.addEventListener('DOMContentLoaded', () => {
  const active = document.querySelector('.pill.on');
  if (active) {
    const indicator = document.getElementById('pill-indicator');
    if (indicator) {
      // Set without transition on first render
      indicator.style.transition = 'none';
      indicator.style.left  = active.offsetLeft + 'px';
      indicator.style.width = active.offsetWidth + 'px';
      requestAnimationFrame(() => {
        indicator.style.transition = '';
      });
    }
  }
});

// ── Init: cooldown check + camera setup ───────────────
(async () => {
  const remaining = await getCooldownRemaining();
  if (remaining > 0) {
    show('screen-cooldown');
    runCooldownClock(); // derives deadline from localStorage on every tick
    return;
  }
  show('screen-start');
  initCamera();
})();

// ── WorldTimeAPI cooldown ──────────────────────────────
async function getServerTime() {
  try {
    const before = Date.now();
    const r = await fetch('https://worldtimeapi.org/api/ip',
      { signal: AbortSignal.timeout(4000) });
    const d = await r.json();
    const serverMs = new Date(d.datetime).getTime();
    // Estimate offset accounting for ~half of round-trip latency
    serverTimeOffset = serverMs - (before + (Date.now() - before) / 2);
    return serverMs;
  } catch {
    return Date.now() + serverTimeOffset;
  }
}

// Returns ms remaining, 0 if expired or no record
async function getCooldownRemaining() {
  const deadline = localStorage.getItem('void_deadline');
  if (!deadline) return 0;
  const now = await getServerTime();
  const remaining = parseInt(deadline) - now;
  return remaining > 0 ? remaining : 0;
}

async function saveCooldown() {
  const now  = await getServerTime();
  const cdMs = 5 * 60 * 1000;
  // Store the absolute expiry timestamp so it survives any browser close
  localStorage.setItem('void_deadline', String(now + cdMs));
}

// Countdown derived from localStorage on every tick — survives tab sleep / browser close
function runCooldownClock() {
  const deadline = parseInt(localStorage.getItem('void_deadline'));
  const el = document.getElementById('cd-display');

  const tick = () => {
    // Use local clock adjusted by the server offset measured at load time
    const remaining = Math.max(0, deadline - (Date.now() + serverTimeOffset));

    const sec = Math.ceil(remaining / 1000);
    const m   = String(Math.floor(sec / 60)).padStart(2, '0');
    const s   = String(sec % 60).padStart(2, '0');
    el.textContent = `${m}:${s}`;

    if (remaining <= 0) {
      localStorage.removeItem('void_deadline');
      show('screen-start');
      initCamera();
      return;
    }
    setTimeout(tick, 500); // 500 ms for smooth sub-second accuracy
  };
  tick();
}

// ── Camera + MediaPipe ─────────────────────────────────
async function initCamera() {
  const dot   = document.getElementById('cam-dot');
  const label = document.getElementById('cam-label');
  try {
    const fs = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );
    faceLandmarker = await FaceLandmarker.createFromOptions(fs, {
      baseOptions: {
        modelAssetPath:
          "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numFaces: 1
    });

    camStream = await navigator.mediaDevices.getUserMedia({
      video: { width: 320, height: 240, facingMode: "user" }
    });
    const vid = document.getElementById('cam-video');
    vid.srcObject = camStream;
    await new Promise(r => { vid.onloadedmetadata = r; });
    vid.play();

    dot.classList.remove('pulse');
    dot.classList.add('ready');
    label.textContent = '웹캠 연결됨';
  } catch {
    dot.style.background = 'var(--muted)';
    dot.classList.remove('pulse');
    label.textContent = '웹캠 없이 시작';
  }
}

// ── Start session ──────────────────────────────────────
document.getElementById('btn-start').addEventListener('click', startSession);

function startSession() {
  // Reset state
  moveCount = 0; moveFrames = 0; moveActive = false; lastNose = null;
  document.getElementById('progress').style.width = '0%';

  const rCanvas = document.getElementById('rest-canvas');
  const dCanvas = document.getElementById('dist-canvas');
  rCanvas.width  = window.innerWidth;
  rCanvas.height = window.innerHeight;
  dCanvas.width  = window.innerWidth;
  dCanvas.height = window.innerHeight;
  dCanvas.style.opacity = '0';

  show('screen-rest');

  // Pick random content
  const type = Math.floor(Math.random() * 3);
  launchContent(type, rCanvas);

  // Movement monitoring
  monitorRunning = true;
  if (faceLandmarker && camStream) monitorLoop();

  // Session timer
  const totalMs  = selectedMin * 60 * 1000;
  const startTs  = Date.now();
  let   disturbed = false;

  const tick = () => {
    const elapsed = Date.now() - startTs;
    const pct = Math.min(elapsed / totalMs, 1);
    document.getElementById('progress').style.width = `${pct * 100}%`;

    if (pct >= 0.8 && !disturbed) {
      disturbed = true;
      startDisturbance(dCanvas);
    }

    if (pct >= 1) {
      endSession(true);
      return;
    }
    sessionTimerId = setTimeout(tick, 500);
  };
  sessionTimerId = setTimeout(tick, 500);
}

// ── End session ────────────────────────────────────────
async function endSession(completed) {
  monitorRunning = false;
  clearTimeout(sessionTimerId);
  if (contentAnimId) { cancelAnimationFrame(contentAnimId); contentAnimId = null; }
  if (distAnimId)    { cancelAnimationFrame(distAnimId);    distAnimId    = null; }
  stopCamera();

  if (completed) {
    await saveCooldown();
    show('screen-done');
  } else {
    show('screen-fail');
  }
}

function stopCamera() {
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
}

// ── Movement monitoring loop ───────────────────────────
function monitorLoop() {
  const vid = document.getElementById('cam-video');
  const run = () => {
    if (!monitorRunning) return;
    if (vid.readyState >= 2) {
      try {
        const res = faceLandmarker.detectForVideo(vid, performance.now());
        if (res.faceLandmarks?.length) {
          const lm = res.faceLandmarks[0];
          const nose  = lm[1];
          const lEye  = lm[33];
          const rEye  = lm[263];
          const faceW = Math.abs(rEye.x - lEye.x) || 0.1;

          if (lastNose) {
            const dx = nose.x - lastNose.x;
            const dy = nose.y - lastNose.y;
            const mv = Math.sqrt(dx * dx + dy * dy) / faceW;

            if (mv > MOVE_THRESHOLD) {
              moveFrames++;
              if (moveFrames >= MOVE_FRAMES && !moveActive) {
                moveActive = true;
                registerMove();
              }
            } else {
              moveFrames = Math.max(0, moveFrames - 2);
              if (moveFrames < 4) moveActive = false;
            }
          }
          lastNose = { x: nose.x, y: nose.y };
        }
      } catch { /* ignore frame errors */ }
    }
    requestAnimationFrame(run);
  };
  requestAnimationFrame(run);
}

function registerMove() {
  moveCount++;
  moveFrames = 0;

  if (moveCount >= 1) {
    monitorRunning = false;
    setTimeout(() => endSession(false), 600);
  } else {
    setTimeout(() => { moveActive = false; }, 3000);
  }
}

// ── Buttons ────────────────────────────────────────────
document.getElementById('btn-retry').addEventListener('click', () => {
  show('screen-start');
  if (!camStream) initCamera();
});
document.getElementById('btn-close-fail').addEventListener('click', () => window.close());
document.getElementById('btn-close-done').addEventListener('click', () => window.close());

window.addEventListener('resize', () => {
  const r = document.getElementById('rest-canvas');
  const d = document.getElementById('dist-canvas');
  if (r) { r.width = window.innerWidth; r.height = window.innerHeight; }
  if (d) { d.width = window.innerWidth; d.height = window.innerHeight; }
});


// ══════════════════════════════════════════════════════
//  CONTENT ANIMATIONS
// ══════════════════════════════════════════════════════

function launchContent(type, canvas) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  if (type === 0) animGeometric(ctx, W, H);
  else if (type === 1) animFire(ctx, W, H);
  else animWater(ctx, W, H);
}

// Radial vignette — draws darkness from edge inward, focusing eye on center
function drawVignette(ctx, W, H) {
  const cx = W / 2, cy = H / 2;
  const r = Math.min(W, H) * 0.62;
  const vg = ctx.createRadialGradient(cx, cy, r * 0.15, cx, cy, r);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.82)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);
}

// ── 0: Geometric Loop ──────────────────────────────────
function animGeometric(ctx, W, H) {
  const CX = W / 2, CY = H / 2;
  let t = 0;

  ctx.fillStyle = '#060606';
  ctx.fillRect(0, 0, W, H);

  const RINGS = [
    { r: 55,  sides: 3, speed:  0.18, lw: 0.8, baseAlpha: 0.55 },
    { r: 110, sides: 4, speed: -0.13, lw: 0.7, baseAlpha: 0.42 },
    { r: 170, sides: 5, speed:  0.09, lw: 0.6, baseAlpha: 0.33 },
    { r: 235, sides: 6, speed: -0.07, lw: 0.5, baseAlpha: 0.26 },
    { r: 305, sides: 7, speed:  0.05, lw: 0.45, baseAlpha: 0.20 },
    { r: 380, sides: 8, speed: -0.04, lw: 0.4, baseAlpha: 0.15 },
    { r: 460, sides: 12, speed: 0.03, lw: 0.3, baseAlpha: 0.10 },
    { r: 550, sides: 16, speed: -0.02, lw: 0.25, baseAlpha: 0.07 },
  ];

  const drawPoly = (cx, cy, r, sides, rot, alpha, lw) => {
    ctx.beginPath();
    for (let i = 0; i <= sides; i++) {
      const a = (i / sides) * Math.PI * 2 + rot;
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
    ctx.lineWidth = lw;
    ctx.stroke();
  };

  const draw = () => {
    contentAnimId = requestAnimationFrame(draw);
    t += 0.007;

    // Soft trail
    ctx.fillStyle = 'rgba(6,6,6,0.18)';
    ctx.fillRect(0, 0, W, H);

    RINGS.forEach(ring => {
      const rot   = t * ring.speed;
      const pulse = 1 + 0.04 * Math.sin(t * 1.6 + ring.r * 0.01);
      const alpha = ring.baseAlpha * (0.8 + 0.2 * Math.sin(t * 0.7 + ring.r * 0.005));
      drawPoly(CX, CY, ring.r * pulse, ring.sides, rot, alpha, ring.lw);
    });

    // Core glow
    const g = ctx.createRadialGradient(CX, CY, 0, CX, CY, 22);
    g.addColorStop(0, `rgba(255,255,255,${0.12 + 0.06 * Math.sin(t * 2)})`);
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(CX, CY, 22, 0, Math.PI * 2);
    ctx.fill();

    drawVignette(ctx, W, H);
  };
  draw();
}

// ── 1: Nature Calm — Fire ─────────────────────────────
function animFire(ctx, W, H) {
  const CX = W / 2;

  // ── Display region (centered tall flame, photo-framing) ──
  const FW = W * 0.74;              // flame width on screen
  const FH = H * 0.65;             // flame height on screen
  const FX = (W - FW) / 2;         // left edge
  const FY = H * 0.055;            // top edge
  const BASE_SCR = FY + FH;        // base y on screen

  // ── Low-resolution work canvas (3× upscaled → silky smooth) ──
  const NW = Math.max(60, Math.floor(FW / 3)) | 0;
  const NH = Math.max(60, Math.floor(FH / 3)) | 0;
  const off    = document.createElement('canvas');
  off.width = NW; off.height = NH;
  const offCtx = off.getContext('2d');
  const img    = offCtx.createImageData(NW, NH);

  // ── Photographic fire palette (RGBA, 9-stop) ──
  // Sampled from real fire photography: black→burgundy→red-orange→orange→yellow-orange→white-yellow
  const STOPS = [
    [  0,   0,   0,   0,   0],
    [ 14,  28,   0,   0,  22],
    [ 36,  88,   4,   0, 105],
    [ 68, 178,  24,   0, 188],
    [108, 242,  72,   2, 228],
    [152, 255, 148,  10, 248],
    [192, 255, 212,  45, 254],
    [222, 255, 244, 125, 255],
    [255, 255, 252, 212, 255],
  ];
  const PAL = new Uint8Array(256 * 4);
  for (let v = 0; v < 256; v++) {
    let lo = STOPS[0], hi = STOPS[1];
    for (let k = 0; k < STOPS.length - 1; k++) {
      if (v >= STOPS[k][0] && v <= STOPS[k+1][0]) { lo = STOPS[k]; hi = STOPS[k+1]; break; }
      lo = STOPS[k]; hi = STOPS[k];
    }
    const span = hi[0] - lo[0];
    const f = span > 0 ? (v - lo[0]) / span : 0;
    PAL[v*4]   = (lo[1] + (hi[1]-lo[1])*f) | 0;
    PAL[v*4+1] = (lo[2] + (hi[2]-lo[2])*f) | 0;
    PAL[v*4+2] = (lo[3] + (hi[3]-lo[3])*f) | 0;
    PAL[v*4+3] = (lo[4] + (hi[4]-lo[4])*f) | 0;
  }

  // ── Domain-warped FBM noise ──
  // Domain warping avoids the grid-like artifacts of simple summed sines.
  // It offsets sample coordinates with a low-freq sine field before
  // sampling the high-freq octaves → organic swirling patterns.
  const fbm = (x, y, t) => {
    // Low-frequency domain warp
    const amp = 2.2;
    const wx = Math.sin(x*0.32 + y*0.26 + t*0.44) * amp;
    const wy = Math.cos(x*0.26 - y*0.32 + t*0.38) * amp;
    const xw = x + wx, yw = y + wy;
    // 4-octave FBM on warped coordinates
    const o1 = Math.sin(xw*1.65 + yw*2.40 + t*0.76);
    const o2 = Math.sin(xw*3.50 - yw*5.05 + t*1.48 + 1.30);
    const o3 = Math.sin(xw*7.10 + yw*10.7 + t*2.85 + 2.65);
    const o4 = Math.sin(xw*14.6 - yw*21.8 + t*5.20 + 4.40);
    return o1*0.500 + o2*0.275 + o3*0.140 + o4*0.085; // ∈ [-1, 1]
  };

  // Sparks
  const sparks = [];
  let t = 0, ticker = 0;
  const spawnSpark = () => {
    if (sparks.length >= 210) return;
    const ang = -Math.PI*0.5 + (Math.random()-0.5)*Math.PI*0.88;
    const spd = 1.8 + Math.random()*5.5;
    sparks.push({
      x: CX + (Math.random()-0.5)*FW*0.48,
      y: BASE_SCR - FH*(0.04 + Math.random()*0.58),
      vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd,
      life:1, decay:0.007+Math.random()*0.014, size:0.6+Math.random()*1.9,
    });
  };

  // placeholder to satisfy old reference
  const BASE_HW = FW / 2;
  const FIRE_H  = FH;
  const BASE_Y  = BASE_SCR;
  const TIP_Y   = FY;

  const draw = () => {
    contentAnimId = requestAnimationFrame(draw);
    t += 0.016; ticker++;
    if (ticker % 2 === 0) spawnSpark();

    // ── Per-pixel fire texture via domain-warped FBM noise ──
    for (let row = 0; row < NH; row++) {
      const ny      = row / NH;         // 0=top, 1=bottom (screen convention)
      const flowY   = ny + t * 0.52;   // upward advection (pattern flows up)

      for (let col = 0; col < NW; col++) {
        const nx  = col / NW;           // 0=left, 1=right
        const idx = (row * NW + col) * 4;

        // ── Flame shape envelope ──
        // Width at this height: tapers toward the tip (low ny)
        const widthAtH = Math.pow(ny, 0.36) * 0.94;
        const distX    = Math.abs(nx - 0.5) * 2; // 0=center, 1=edge
        if (widthAtH < 0.01 || distX >= widthAtH) {
          img.data[idx + 3] = 0;
          continue;
        }
        // Soft horizontal falloff (avoids hard geometric edge)
        const envX = Math.pow(1 - distX / widthAtH, 1.25);
        // Vertical: brighter toward base (photographic flame = hotter at base)
        const envY = Math.pow(ny, 0.38);

        // ── Noise → heat ──
        // Raw noise ∈ [-1, 1]; threshold & gamma create dark gaps (real fire structure)
        const raw   = fbm(nx * NW * 0.092, flowY * NH * 0.098, t);
        // Shift bias toward positive so ~60% of pixels are lit
        const biased = raw * 0.88 + 0.18;
        // Power < 1: soft transition at zero crossing (no hard cutoff)
        const flame  = Math.pow(Math.max(0, biased), 0.72);

        // Final luminance 0..255
        const heat = Math.min(255, flame * envX * envY * 272) | 0;

        img.data[idx]     = PAL[heat * 4];
        img.data[idx + 1] = PAL[heat * 4 + 1];
        img.data[idx + 2] = PAL[heat * 4 + 2];
        img.data[idx + 3] = PAL[heat * 4 + 3];
      }
    }
    offCtx.putImageData(img, 0, 0);

    // ── Background ──
    ctx.fillStyle = '#060101';
    ctx.fillRect(0, 0, W, H);

    // ── Scale up 3× with bilinear smoothing → silky texture ──
    ctx.imageSmoothingEnabled  = true;
    ctx.imageSmoothingQuality  = 'high';
    ctx.drawImage(off, 0, 0, NW, NH, FX, FY, FW, FH);

    // ── Screen-blend luminous glow overlays ──
    ctx.save();
    ctx.globalCompositeOperation = 'screen';

    // Wide photographic bloom (fire lights up dark surround)
    const ambMidY = BASE_SCR - FH * 0.44;
    const ambGlow = ctx.createRadialGradient(CX, ambMidY, 0, CX, BASE_SCR, W * 0.60);
    ambGlow.addColorStop(0,    'rgba(255, 92, 12, 0.20)');
    ambGlow.addColorStop(0.42, 'rgba(160, 36,  5, 0.09)');
    ambGlow.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = ambGlow; ctx.fillRect(0, 0, W, H);

    // Pulsing hot core (white-yellow, near base)
    const cf   = 0.74 + 0.26 * Math.sin(t * 4.6 + 0.5);
    const core = ctx.createRadialGradient(
      CX, BASE_SCR - FH * 0.09, 0,
      CX, BASE_SCR,             W * 0.148
    );
    core.addColorStop(0,    `rgba(255,255,205,${0.68 * cf})`);
    core.addColorStop(0.22, `rgba(255,208, 52,${0.40 * cf})`);
    core.addColorStop(0.52, `rgba(255,112, 14,${0.18 * cf})`);
    core.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = core; ctx.fillRect(0, 0, W, H);

    // Drifting mid-body hot spot (gives roiling internal brightness)
    const driftX = CX + Math.sin(t * 0.52) * FW * 0.09;
    const driftY = BASE_SCR - FH * 0.38;
    const midG   = ctx.createRadialGradient(driftX, driftY, 0, driftX, driftY, W * 0.10);
    midG.addColorStop(0,   `rgba(255,172, 28,${0.36 * cf})`);
    midG.addColorStop(0.45,`rgba(230, 72,  7,${0.16 * cf})`);
    midG.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = midG; ctx.fillRect(0, 0, W, H);
    ctx.restore();

    // ── Sparks / flying embers ──
    ctx.save();
    for (let i = sparks.length - 1; i >= 0; i--) {
      const s = sparks[i];
      s.x += s.vx; s.y += s.vy;
      s.vx += (Math.random() - 0.5) * 0.24;
      s.vy += 0.056;
      s.life -= s.decay;
      if (s.life <= 0) { sparks.splice(i, 1); continue; }
      const tl = s.life;
      let cr, cg, cb;
      if (tl > 0.65)       { cr=255; cg=222; cb=(60+110*tl)|0; }
      else if (tl > 0.30)  { cr=255; cg=(52+162*tl)|0; cb=0; }
      else                 { cr=(255*(tl/0.30)*0.82+44)|0; cg=(8*tl/0.30)|0; cb=0; }
      ctx.globalAlpha = Math.min(1, tl * 2.6) * 0.88;
      const sr  = s.size * tl * 6;
      const sgr = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, sr);
      sgr.addColorStop(0, `rgba(${cr},${cg},${cb},0.52)`);
      sgr.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = sgr;
      ctx.beginPath(); ctx.arc(s.x, s.y, sr, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = `rgb(${cr},${cg},${cb})`;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.size * tl, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();

    ctx.globalAlpha = 1;
    drawVignette(ctx, W, H);
  };
  draw();
}

// ── 2: Nature Calm — Water ─────────────────────────────
function animWater(ctx, W, H) {
  const COLS = Math.floor(W / 2);
  const ROWS = Math.floor(H / 2);
  const n    = COLS * ROWS;

  // 3-buffer wave simulation
  const bufs = [new Float32Array(n), new Float32Array(n), new Float32Array(n)];
  let iC = 0, iP = 1, iN = 2;

  // Spray particle pool
  const spray = [];
  const MAX_SPRAY = 80;

  // Gaussian raindrop — spawns spray on impact
  const addDrop = (fx, fy) => {
    const x = fx !== undefined ? fx : Math.floor(COLS * 0.18 + Math.random() * COLS * 0.64);
    const y = fy !== undefined ? fy : Math.floor(ROWS * 0.18 + Math.random() * ROWS * 0.64);
    const r   = 2 + Math.floor(Math.random() * 5);
    const amp = 170 + Math.random() * 130;
    for (let dy = -r; dy <= r; dy++) {
      for (let dx2 = -r; dx2 <= r; dx2++) {
        const d2 = dx2*dx2 + dy*dy;
        if (d2 <= r*r) {
          const nx2 = x+dx2, ny2 = y+dy;
          if (nx2 > 0 && nx2 < COLS-1 && ny2 > 0 && ny2 < ROWS-1)
            bufs[iC][ny2*COLS+nx2] += amp * Math.exp(-d2 / (r*r*0.45));
        }
      }
    }
    // Spawn radial spray
    if (spray.length < MAX_SPRAY) {
      const sx = x/COLS*W, sy = y/ROWS*H;
      const cnt = 4 + Math.floor(Math.random()*5);
      for (let s = 0; s < cnt; s++) {
        const ang = Math.random()*Math.PI*2;
        const spd = 0.8 + Math.random()*2.8;
        spray.push({ x:sx, y:sy,
          vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - 2.2,
          life:1, decay: 0.035+Math.random()*0.045, size:1.2+Math.random()*2 });
      }
    }
  };

  let nextDrop = Date.now() + 350;
  let t = 0;

  const step = () => {
    const curr = bufs[iC], prev = bufs[iP], next = bufs[iN];
    for (let y = 1; y < ROWS-1; y++) {
      for (let x = 1; x < COLS-1; x++) {
        const i = y*COLS+x;
        next[i] = (
          curr[(y-1)*COLS+x] + curr[(y+1)*COLS+x] +
          curr[y*COLS+x-1]   + curr[y*COLS+x+1]
        ) / 2 - prev[i];
        next[i] *= 0.982;
      }
    }
    const tmp = iN; iN = iP; iP = iC; iC = tmp;
  };

  const off    = document.createElement('canvas');
  off.width = COLS; off.height = ROWS;
  const offCtx = off.getContext('2d');
  const img    = offCtx.createImageData(COLS, ROWS);

  // Caustic overlay (half-res)
  const causOff = document.createElement('canvas');
  causOff.width = COLS; causOff.height = ROWS;
  const causCtx = causOff.getContext('2d');
  const causImg = causCtx.createImageData(COLS, ROWS);

  // Sun glint canvas (full-res, drawn with gradients)
  const glintOff = document.createElement('canvas');
  glintOff.width = W; glintOff.height = H;
  const glintCtx = glintOff.getContext('2d');

  // Light direction — sun overhead, slightly forward-right
  const lx = 0.18, ly = -0.42, lz = 1.0;
  const ll  = Math.sqrt(lx*lx + ly*ly + lz*lz);

  const drawCaustics = () => {
    const curr = bufs[iC];
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        const i = y*COLS+x;
        const h = curr[i] || 0;
        // 3-wave interference pattern shifted by local wave height
        const c1 = Math.sin(x*0.20 + y*0.10 + t*0.9  + h*0.011);
        const c2 = Math.sin(x*0.10 - y*0.22 + t*0.65 + h*0.008);
        const c3 = Math.sin((x+y)*0.15       + t*1.15 + h*0.014);
        const caus = Math.pow(((c1+c2+c3)/3 + 1)/2, 2.8);
        const bright = caus * 255 | 0;
        const idx = i*4;
        causImg.data[idx]   = bright*0.45 | 0;
        causImg.data[idx+1] = bright*0.78 | 0;
        causImg.data[idx+2] = bright | 0;
        causImg.data[idx+3] = bright*0.80 | 0;
      }
    }
    causCtx.putImageData(causImg, 0, 0);
  };

  const drawSunGlint = () => {
    glintCtx.clearRect(0, 0, W, H);
    // Drifting sun halo
    const sunX = W * (0.38 + Math.sin(t*0.11)*0.14);
    const sunY = H * 0.10;
    const halo = glintCtx.createRadialGradient(sunX, sunY, 0, sunX, sunY, W*0.52);
    halo.addColorStop(0,   'rgba(160,215,255,0.28)');
    halo.addColorStop(0.28,'rgba(80,155,235,0.10)');
    halo.addColorStop(1,   'rgba(0,0,0,0)');
    glintCtx.fillStyle = halo;
    glintCtx.fillRect(0, 0, W, H);

    // 3 animated glint streaks
    for (let k = 0; k < 3; k++) {
      const sx = W*(0.18 + k*0.32 + Math.sin(t*0.07+k*2.3)*0.07);
      const sy = H*(0.07 + Math.sin(t*0.05+k*1.9)*0.05);
      const streak = glintCtx.createLinearGradient(sx-80, sy, sx+80, sy+14);
      streak.addColorStop(0,   'rgba(190,230,255,0)');
      streak.addColorStop(0.5, 'rgba(190,230,255,0.85)');
      streak.addColorStop(1,   'rgba(190,230,255,0)');
      glintCtx.save();
      glintCtx.globalAlpha = 0.20;
      glintCtx.fillStyle = streak;
      glintCtx.fillRect(sx-80, sy, 160, 10);
      glintCtx.restore();
    }
  };

  const draw = () => {
    contentAnimId = requestAnimationFrame(draw);
    t += 0.016;

    const now = Date.now();
    if (now >= nextDrop) {
      addDrop();
      if (Math.random() < 0.28) setTimeout(() => addDrop(), 90);
      if (Math.random() < 0.12) setTimeout(() => addDrop(), 200);
      nextDrop = now + 500 + Math.random() * 1600;
    }
    step();

    const curr = bufs[iC];

    // Build per-pixel wave shading
    for (let y = 1; y < ROWS-1; y++) {
      for (let x = 1; x < COLS-1; x++) {
        const i = y*COLS+x;
        const h = curr[i];

        // Amplify normal gradient so ripple rings are clearly visible
        const gx = (curr[y*COLS+x+1]   - curr[y*COLS+x-1])   * 0.022;
        const gy = (curr[(y+1)*COLS+x] - curr[(y-1)*COLS+x]) * 0.022;

        const nx = -gx, ny = -gy, nz = 1.0;
        const nl  = Math.sqrt(nx*nx + ny*ny + nz*nz);

        const diff = Math.max(0, (nx*lx + ny*ly + nz*lz) / (nl*ll));

        const rx = lx - 2*(lx*nx/nl)*(nx/nl);
        const ry = ly - 2*(ly*ny/nl)*(ny/nl);
        const rz = lz - 2*(lz*nz/nl)*(nz/nl);
        const rll = Math.sqrt(rx*rx+ry*ry+rz*rz);
        const vDotR = Math.max(0, rz/rll);
        const spec  = Math.pow(vDotR, 48);   // ripple crest glint
        const spec2 = Math.pow(vDotR, 8) * 0.32; // broad diffuse ring haze

        const depth = Math.max(0, Math.min(1, (h+120)/240));
        let r, g, b;
        // Dark navy base + boosted ripple shading for visible rings
        r = Math.min(255, Math.round( 1 + depth*4   + diff*18  + spec*30  + spec2*8 ) | 0);
        g = Math.min(255, Math.round( 3 + depth*7   + diff*38  + spec*42  + spec2*14) | 0);
        b = Math.min(255, Math.round(18 + depth*16  + diff*72  + spec*85  + spec2*28) | 0);

        img.data[i*4]   = r;
        img.data[i*4+1] = g;
        img.data[i*4+2] = b;
        img.data[i*4+3] = 255;
      }
    }
    offCtx.putImageData(img, 0, 0);

    // Darkest navy background — no pattern, no gradient
    ctx.fillStyle = '#020508';
    ctx.fillRect(0, 0, W, H);

    // Wave pixels (scaled up)
    ctx.drawImage(off, 0, 0, COLS, ROWS, 0, 0, W, H);

    // Caustic: removed (was the visible dot pattern)

    // Sun glint: removed

    // Spray particles
    ctx.save();
    for (let s = spray.length-1; s >= 0; s--) {
      const p = spray[s];
      p.x += p.vx; p.y += p.vy; p.vy += 0.14;
      p.life -= p.decay;
      if (p.life <= 0) { spray.splice(s, 1); continue; }
      const alpha = p.life * 0.72;
      const rad = p.size * p.life;
      const sg = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, rad*2);
      sg.addColorStop(0, `rgba(100,140,220,${alpha})`);
      sg.addColorStop(1, 'rgba(60,90,180,0)');
      ctx.fillStyle = sg;
      ctx.beginPath(); ctx.arc(p.x, p.y, rad*2, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();

    drawVignette(ctx, W, H);
  };
  draw();
}


// ══════════════════════════════════════════════════════
//  DISTURBANCE SYSTEM (80% mark)
// ══════════════════════════════════════════════════════

function startDisturbance(canvas) {
  canvas.style.opacity = '1';
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // Butterflies
  const bflies = Array.from({ length: 6 }, () => ({
    x:  Math.random() * W,
    y:  Math.random() * H,
    vx: (Math.random() - 0.5) * 1.2,
    vy: (Math.random() - 0.5) * 1.2,
    ph: Math.random() * Math.PI * 2,
    sz: 10 + Math.random() * 10,
    op: 0,
  }));

  // Floating particles
  const parts = Array.from({ length: 40 }, () => ({
    x:  Math.random() * W,
    y:  H + Math.random() * 80,
    vx: (Math.random() - 0.5) * 0.4,
    vy: -(0.4 + Math.random() * 0.6),
    sz: 1.5 + Math.random() * 2.5,
    life: Math.random(),
  }));

  const draw = () => {
    distAnimId = requestAnimationFrame(draw);
    ctx.clearRect(0, 0, W, H);
    const t = performance.now() / 1000;

    // Draw butterflies
    bflies.forEach(b => {
      b.x  += b.vx + Math.sin(t * 2.1 + b.ph) * 0.6;
      b.y  += b.vy + Math.cos(t * 1.7 + b.ph) * 0.6;
      b.op  = Math.min(b.op + 0.008, 0.5);
      if (b.x < -60) b.x = W + 20;
      if (b.x > W+60) b.x = -20;
      if (b.y < -60) b.y = H + 20;
      if (b.y > H+60) b.y = -20;

      const flap = b.sz * (0.75 + 0.25 * Math.sin(t * 8 + b.ph));
      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.globalAlpha = b.op;
      ctx.strokeStyle = 'rgba(255,255,255,0.65)';
      ctx.lineWidth = 0.8;

      // Left wing
      ctx.beginPath();
      ctx.ellipse(-flap * 0.55, -flap * 0.15, flap, flap * 0.55,
        Math.sin(t * 7 + b.ph) * 0.25, 0, Math.PI * 2);
      ctx.stroke();
      // Right wing
      ctx.beginPath();
      ctx.ellipse(flap * 0.55, -flap * 0.15, flap, flap * 0.55,
        -Math.sin(t * 7 + b.ph) * 0.25, 0, Math.PI * 2);
      ctx.stroke();

      ctx.restore();
    });

    // Draw particles
    ctx.fillStyle = 'rgba(255,255,255,1)';
    parts.forEach(p => {
      p.x    += p.vx;
      p.y    += p.vy;
      p.life += 0.004;
      if (p.life >= 1) { p.life = 0; p.x = Math.random()*W; p.y = H+10; }
      const a = 0.35 * (1 - p.life);
      ctx.globalAlpha = a;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.sz * (1 - p.life * 0.4), 0, Math.PI * 2);
      ctx.fill();
    });

    ctx.globalAlpha = 1;
  };
  draw();
}
</script>
